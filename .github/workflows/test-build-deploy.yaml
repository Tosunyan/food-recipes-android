name: Test, Build, Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      deploy:
        required: true
        type: boolean

permissions:
  contents: read

env:
  KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
  KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
  STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

  APK_PATH: ${{ vars.APK_PATH }}
  MEAL_API_URL: ${{ vars.MEAL_API_URL }}
  MEAL_API_KEY: ${{ secrets.MEAL_API_KEY }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4.4.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test

  build:
    if: inputs.deploy
    name: Build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4.4.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # TODO Build release APK for Production environment
      - name: Build Debug APK
        run: ./gradlew app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ vars.APK_PATH }}

  deploy:
    if: inputs.deploy
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ inputs.environment }}
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: artifacts

      - name: Deploy to Firebase App Distribution
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          npm install -g firebase-tools
          firebase --version
          firebase appdistribution:distribute "artifacts/$(basename "$APK_PATH")" \
            --app "$FIREBASE_APP_ID" \
            --release-notes "$COMMIT_MESSAGE" \
            --groups "trusted-testers"